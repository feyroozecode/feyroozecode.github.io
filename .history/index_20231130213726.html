<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio SPA</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css">
  <style>
    body {
            @apply font-sans bg-gray-100;
            }
        
            #app {
                @apply flex h-screen bg-gray-200;
            }
        
            /* Sidebar Styles */
            .sidebar {
                @apply bg-indigo-700 text-white w-64 py-8 px-4;
            }
        
            .sidebar h1 {
                @apply text-xl font-semibold mb-4;
            }
        
            .sidebar nav ul li {
                @apply mb-2 p-2 rounded cursor-pointer;
            }
        
            .sidebar nav ul li:hover,
            .sidebar nav ul li:focus {
                @apply bg-indigo-800;
            }
        
            /* Content Styles */
            .content {
                @apply flex-1 p-8;
            }
        
            .content h2 {
                @apply text-3xl font-semibold mb-4;
            }
  </style>

  <script src="https://cdn.tailwindcss.com"></script>

</head>
</head>
<body>

    <!-- sidebar-->
    <aside class="bg-teal-500 w-64 p-6">
         <h1 class="text-2xl font-semibold text-white">Portfolio</h1>
    <nav class="mt-6">
        <li>
            <a href="#" onclick="navigateTo('home')">Home</a>
        </li>
       <li>
         <a href="#" onclick="navigateTo('about')">About</a>
       </li>
       <li>
         <a href="#" onclick="navigateTo('projects')">Projects</a>
       </li>
        <li>
          <a href="#" onclick="navigateTo('contact')">Contact</a>
        </li>
    </nav>
    </aside>

<main id="main">
    
</main>

<script>
  function navigateTo(page) {
    switch (page) {
      case 'home':
            renderHome();
        break;
      case 'about':
        renderAbout();
        break;
      case 'projects':
        renderProjects();
        break;
      case 'contact':
        renderContact();
        break;
      default:
        renderHome();
    }
  }

  const main = `main` ;

  function renderHome(page) {
    document.getElementById(main).innerHTML = page ;
  }

  // Initial load
  navigateTo('home');
</script>

</body>
</html>
